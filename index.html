<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Loadstring Format Generator</title>
</head>
<body style="background-color: #000000; margin: 0; padding: 20px; font-family: monospace; color: #ffffff;">

<div style="max-width: 650px; margin: 20px auto; background: #0d1117; padding: 25px; border-radius: 8px; border: 1px solid #30363d;">
    <h2 style="margin-top: 0; color: #f0f6fc; font-size: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px;">Loadstring Builder</h2>
    
    <p style="color: #8b949e; font-size: 14px;">Enter your GitHub repository information to generate the exact raw format:</p>

    <!-- Inputs aligned with your exact example format -->
    <div style="margin-bottom: 12px;">
        <label style="display:block; margin-bottom:5px; color:#c9d1d9;">GitHub Username:</label>
        <input type="text" id="username" placeholder="e.g., finwo67" style="width:100%; background:#010409; color:#fff; border:1px solid #30363d; padding:8px; box-sizing:border-box; border-radius:4px;">
    </div>

    <div style="margin-bottom: 12px;">
        <label style="display:block; margin-bottom:5px; color:#c9d1d9;">Repository Name:</label>
        <input type="text" id="repo" placeholder="e.g., python.hackrage" style="width:100%; background:#010409; color:#fff; border:1px solid #30363d; padding:8px; box-sizing:border-box; border-radius:4px;">
    </div>

    <div style="margin-bottom: 12px;">
        <label style="display:block; margin-bottom:5px; color:#c9d1d9;">Branch:</label>
        <input type="text" id="branch" value="main" placeholder="e.g., main" style="width:100%; background:#010409; color:#fff; border:1px solid #30363d; padding:8px; box-sizing:border-box; border-radius:4px;">
    </div>

    <div style="margin-bottom: 20px;">
        <label style="display:block; margin-bottom:5px; color:#c9d1d9;">File Name / Path:</label>
        <input type="text" id="filename" placeholder="e.g., python.hackrage" style="width:100%; background:#010409; color:#fff; border:1px solid #30363d; padding:8px; box-sizing:border-box; border-radius:4px;">
    </div>

    <button onclick="buildGitHubLoadstring()" style="background:#238636; color:white; border:none; padding:10px 20px; font-weight:bold; cursor:pointer; border-radius:4px; font-size:14px;">Build Loadstring</button>

    <div id="outputContainer" style="display:none; margin-top: 25px; border-top: 1px solid #30363d; padding-top: 20px;">
        <span style="color: #58a6ff; font-weight: bold; display: block; margin-bottom: 8px;">Resulting Execution String:</span>
        <input type="text" id="finalOutput" readonly style="width:100%; background:#161b22; color:#58a6ff; border:1px solid #30363d; padding:10px; font-family:monospace; box-sizing:border-box; border-radius:4px; font-size:13px;">
        <button onclick="copyResult()" style="margin-top: 10px; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 12px;">Copy to Clipboard</button>
    </div>
</div>

<script>
function buildGitHubLoadstring() {
    const user = document.getElementById("username").value.trim();
    const repo = document.getElementById("repo").value.trim();
    const branch = document.getElementById("branch").value.trim();
    const file = document.getElementById("filename").value.trim();

    if (!user || !repo || !file) {
        alert("Please fill out Username, Repository, and File Name fields.");
        return;
    }

    // Constructs the absolute target structure matching refs/heads/
    const targetUrl = `https://raw.githubusercontent.com/${user}/${repo}/refs/heads/${branch}/${file}`;
    const formattedLoadstring = `loadstring(game:HttpGet("${targetUrl}"))()`;

    document.getElementById("finalOutput").value = formattedLoadstring;
    document.getElementById("outputContainer").style.display = "block";
}

function copyResult() {
    const outputField = document.getElementById("finalOutput");
    outputField.select();
    outputField.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(outputField.value);
}
</script>

</body>
</html>
