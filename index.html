<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Raw Content Fetcher</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --border-color: #30363d;
            --text-color: #c9d1d9;
            --accent-color: #238636;
            --accent-hover: #2ea043;
            --input-bg: #010409;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        input[type="text"] {
            flex: 1;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            padding: 8px 12px;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.3);
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: 1px solid rgba(240,246,252,0.1);
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        .output-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .url-display {
            font-family: monospace;
            font-size: 12px;
            color: #8b949e;
            word-break: break-all;
            max-width: 70%;
        }

        textarea {
            width: 100%;
            height: 400px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #e6edf3;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 13px;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
        }

        .status {
            font-size: 14px;
            margin-bottom: 10px;
        }
        .error { color: #f85149; }
        .success { color: #3fb950; }
    </style>
</head>
<body>

<div class="container">
    <h2>GitHub Raw Content Linker & Fetcher</h2>
    
    <div class="input-group">
        <input type="text" id="githubUrl" placeholder="Paste GitHub file URL here (e.g., https://github.com/user/repo/blob/main/script.lua)">
        <button onclick="processUrl()">Fetch Content</button>
    </div>

    <div id="statusMessage" class="status"></div>

    <div class="output-actions">
        <div id="rawUrlDisplay" class="url-display"></div>
        <button id="copyBtn" style="background-color: #21262d; border-color: var(--border-color);" onclick="copyToClipboard()" disabled>Copy Raw Text</button>
    </div>

    <textarea id="outputCode" placeholder="Raw content will load here..." readonly></textarea>
</div>

<script>
    function convertToRawUrl(url) {
        try {
            let cleanUrl = url.trim();
            if (!cleanUrl) return null;

            // Handle standard github.com file browser URLs
            if (cleanUrl.includes("github.com")) {
                // Replace blob line marker if present
                cleanUrl = cleanUrl.replace(/\/blob\//, '/');
                // Swap domains
                cleanUrl = cleanUrl.replace("github.com", "raw.githubusercontent.com");
                return cleanUrl;
            }
            
            // Return as-is if it's already a raw link
            if (cleanUrl.includes("raw.githubusercontent.com")) {
                return cleanUrl;
            }

            return null;
        } catch (e) {
            return null;
        }
    }

    async function processUrl() {
        const inputUrl = document.getElementById("githubUrl").value;
        const statusDiv = document.getElementById("statusMessage");
        const urlDisplay = document.getElementById("rawUrlDisplay");
        const textarea = document.getElementById("outputCode");
        const copyBtn = document.getElementById("copyBtn");

        // Clear layout state
        statusDiv.className = "status";
        statusDiv.innerText = "Processing...";
        textarea.value = "";
        urlDisplay.innerText = "";
        copyBtn.disabled = true;

        const rawUrl = convertToRawUrl(inputUrl);

        if (!rawUrl) {
            statusDiv.className = "status error";
            statusDiv.innerText = "Invalid URL structure. Please provide a valid GitHub file path link.";
            return;
        }

        urlDisplay.innerText = "Raw URL: " + rawUrl;

        try {
            const response = await fetch(rawUrl);
            if (!response.ok) {
                throw new Error(`HTTP Error Status: ${response.status}`);
            }
            const data = await response.text();
            
            textarea.value = data;
            statusDiv.className = "status success";
            statusDiv.innerText = "Successfully fetched raw content!";
            copyBtn.disabled = false;
        } catch (error) {
            statusDiv.className = "status error";
            statusDiv.innerText = `Failed to download file data. (Ensure the repo is public and CORS permits local client requests). Error: ${error.message}`;
        }
    }

    function copyToClipboard() {
        const textarea = document.getElementById("outputCode");
        textarea.select();
        textarea.setSelectionRange(0, 99999); // Mobile compatibility
        navigator.clipboard.writeText(textarea.value);
        
        const copyBtn = document.getElementById("copyBtn");
        const originalText = copyBtn.innerText;
        copyBtn.innerText = "Copied!";
        setTimeout(() => {
            copyBtn.innerText = originalText;
        }, 2000);
    }
</script>

</body>
</html>
